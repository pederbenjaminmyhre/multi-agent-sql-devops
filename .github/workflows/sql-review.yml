name: SQL Review Agent

on:
  pull_request:
    paths:
      - '**/*.sql'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed SQL files
        id: sql
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} \
                  ${{ github.sha }} -- '*.sql' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "No SQL files changed."
          fi

      - name: Call Review API
        if: steps.sql.outputs.files != ''
        run: |
          for f in ${{ steps.sql.outputs.files }}; do
            echo "Reviewing: $f"
            SQL_CONTENT=$(cat "$f")
            RESPONSE=$(curl -sf -X POST "${{ secrets.REVIEW_API_URL }}/review" \
              -H "Content-Type: application/json" \
              -d "{\"sql\": $(echo "$SQL_CONTENT" | jq -Rs .)}" || echo '{"error":"API unreachable"}')
            BASENAME=$(basename "$f" .sql)
            echo "$RESPONSE" > "review-${BASENAME}.json"
            echo "--- Response for $f ---"
            echo "$RESPONSE" | jq .
          done

      - name: Post PR Comment
        if: steps.sql.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.startsWith('review-') && f.endsWith('.json'));
            let body = '## :robot: SQL Review Agent Report\n\n';

            for (const f of files) {
              const raw = fs.readFileSync(f, 'utf8');
              let report;
              try { report = JSON.parse(raw); } catch { continue; }

              const name = f.replace('review-', '').replace('.json', '');
              body += `### \`${name}.sql\`\n`;

              if (report.error) {
                body += `> :warning: Error: ${report.error}\n\n`;
                continue;
              }

              body += `**Status:** ${report.status} | **Iterations:** ${report.iterations}\n\n`;
              if (report.findings && report.findings.length > 0) {
                body += '| Severity | Agent | Message |\n|---|---|---|\n';
                for (const finding of report.findings) {
                  body += `| ${finding.severity} | ${finding.agent} | ${finding.message} |\n`;
                }
              } else {
                body += ':white_check_mark: No issues found.\n';
              }
              body += '\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail on critical findings
        if: steps.sql.outputs.files != ''
        run: |
          FAILED=0
          for f in review-*.json; do
            [ -f "$f" ] || continue
            if jq -e '.findings[]? | select(.severity == "error")' "$f" > /dev/null 2>&1; then
              echo "::error::Critical SQL issues found in $f — merge blocked"
              FAILED=1
            fi
          done
          exit $FAILED
